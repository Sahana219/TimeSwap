<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TimeSwap Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7ff;
        }

        .profile-card{
            max-width:800px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.1);
        }

        .avatar{
            width:130px;
            height:130px;
            border-radius:50%;
            background:linear-gradient(135deg,#4F46E5,#9333EA);
            color:white;
            font-size:55px;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
        }

        .stat-card{
            background:#f8f9fa;
            border-radius:15px;
            padding:20px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="profile-card">

    <div class="avatar">
        👤
    </div>

    <br>

    <h2 class="text-center">
        {{ name }}
    </h2>

    <hr>

    <div class="row g-3">

        <div class="col-md-6">

            <div class="stat-card">

                <h5>💰 Credits</h5>

                <h3>{{ credits }}</h3>

            </div>

        </div>

        <div class="col-md-6">

            <div class="stat-card">

                <h5>⭐ Reputation</h5>

                <h3>{{ reputation }}</h3>

            </div>

        </div>

        <div class="col-md-6">

            <div class="stat-card">

                <h5>📌 Tasks Posted</h5>

                <h3>{{ total_questions }}</h3>

            </div>

        </div>

        <div class="col-md-6">

            <div class="stat-card">

                <h5>💬 Solutions Submitted</h5>

                <h3>{{ total_answers }}</h3>

            </div>

        </div>

    </div>

    <br>

    <div class="text-center">

        <a href="/dashboard"
           class="btn btn-primary">

            Back to Dashboard

        </a>

        <a href="/logout"
           class="btn btn-danger">

            Logout

        </a>

    </div>

</div>

</body>
</html>
