<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSwap - Register</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

<style>

    body{
        background:linear-gradient(135deg,#4F46E5,#9333EA);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:30px;
    }

    .register-card{
        background:white;
        border-radius:25px;
        overflow:hidden;
        box-shadow:0 15px 40px rgba(0,0,0,0.25);
    }

    .form-section{
        padding:50px;
    }

    .image-section{
        background:#eef2ff;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:30px;
    }

    .logo{
        color:#4F46E5;
        font-size:2.2rem;
        font-weight:bold;
    }

    .register-title{
        font-weight:700;
        color:#111827;
    }

    .form-control{
        border-radius:15px;
        padding:14px;
        border:2px solid #e5e7eb;
    }

    .form-control:focus{
        border-color:#4F46E5;
        box-shadow:0 0 10px rgba(79,70,229,0.2);
    }

    .btn-register{
        width:100%;
        border:none;
        padding:15px;
        border-radius:15px;
        color:white;
        font-size:18px;
        font-weight:bold;
        background:linear-gradient(135deg,#4F46E5,#9333EA);
        transition:0.3s;
    }

    .btn-register:hover{
        transform:translateY(-3px);
    }

    .hero-image{
        width:100%;
        max-height:500px;
        animation:float 4s ease-in-out infinite;
    }

    @keyframes float{

        0%{
            transform:translateY(0px);
        }

        50%{
            transform:translateY(-15px);
        }

        100%{
            transform:translateY(0px);
        }

    }

    .login-link{
        text-align:center;
        margin-top:20px;
    }

    @media(max-width:768px){

        .form-section{
            padding:30px;
        }

        .image-section{
            display:none;
        }

    }

</style>
```

</head>

<body>

<div class="container">

```
<div class="row justify-content-center">

    <div class="col-lg-10">

        <div class="register-card">

            <div class="row g-0">

                <!-- Form Section -->

                <div class="col-md-6">

                    <div class="form-section">

                        <div class="text-center mb-4">

                            <h1 class="logo">
                                TimeSwap
                            </h1>

                            <h3 class="register-title">
                                Create Your Account 🚀
                            </h3>

                            <p class="text-muted">
                                Learn • Collaborate • Earn Time Credits
                            </p>

                        </div>

                        <form action="/register" method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    <i class="bi bi-person"></i>
                                    Full Name
                                </label>

                                <input
                                    type="text"
                                    name="name"
                                    class="form-control"
                                    placeholder="Enter your full name"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    <i class="bi bi-envelope"></i>
                                    Email
                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="Enter your email"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    <i class="bi bi-lock"></i>
                                    Password
                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Create password"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    <i class="bi bi-code-slash"></i>
                                    Skills Offered
                                </label>

                                <input
                                    type="text"
                                    name="skills_offered"
                                    class="form-control"
                                    placeholder="Java, Python, UI Design">

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    <i class="bi bi-lightbulb"></i>
                                    Skills Needed
                                </label>

                                <input
                                    type="text"
                                    name="skills_needed"
                                    class="form-control"
                                    placeholder="Resume Review, React, SQL">

                            </div>

                            <button
                                type="submit"
                                class="btn-register">
                                Create Account
                            </button>

                        </form>

                        <div class="login-link">

                            Already have an account?

                            <a href="/login">
                                Login
                            </a>

                        </div>

                    </div>

                </div>

                <!-- Illustration Section -->

                <div class="col-md-6 image-section">

                    <img
                        src="{{ url_for('static', filename='images/learning.svg') }}"
                        alt="Learning Illustration"
                        class="hero-image">

                </div>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>

</html>
