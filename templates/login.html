<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TimeSwap - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background:linear-gradient(135deg,#4F46E5,#9333EA);
            min-height:100vh;
        }

        .login-container{
            min-height:100vh;
            display:flex;
            align-items:center;
        }

        .login-card{
            background:white;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0px 15px 35px rgba(0,0,0,0.2);
        }

        .form-section{
            padding:50px;
        }

        .image-section{
            background:#eef2ff;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .login-title{
            color:#4F46E5;
            font-weight:bold;
            margin-bottom:20px;
        }

        .btn-login{
            width:100%;
            background:#4F46E5;
            color:white;
            border:none;
            padding:12px;
            border-radius:12px;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#3730A3;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .hero-image{
            max-width:100%;
        }

    </style>

</head>

<body>

<div class="container login-container">

<div class="row w-100 justify-content-center">

<div class="col-lg-10">

<div class="login-card">

<div class="row g-0">

<div class="col-md-6">

<div class="form-section">

<h2 class="login-title">
Welcome Back 👋
</h2>

<p class="text-muted">
Login and continue your TimeSwap journey.
</p>

<form action="/login" method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="mb-4">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter your password"
required>

</div>

<button
type="submit"
class="btn-login">
Login
</button>

</form>

<br>

<p>
Don't have an account?
<a href="/register">Register</a>
</p>

</div>

</div>

<div class="col-md-6 image-section">

<img
src="{{ url_for('static', filename='images/login.svg') }}"
class="img-fluid hero-image"
alt="Login Illustration">

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
